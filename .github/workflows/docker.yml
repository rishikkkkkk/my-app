name: Docker Build & Push

on:
  push:
    branches:
      - main

jobs:
  docker:
    uses: clouddrove/github-shared-workflows/.github/workflows/docker-build-push.yml@v2
    with:
      provider: DOCKERHUB
      images: rishikkk/my-app
      IMAGE_TAG: v1
    secrets:
      DOCKERHUB_USERNAME: 
      DOCKERHUB_PASSWORD: