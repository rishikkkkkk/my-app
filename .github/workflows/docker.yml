name: Docker Build & Push

on:
  push:
    branches:
      - main

jobs:
  docker:
    uses: clouddrove/github-shared-workflows/.github/workflows/docker-build-push.yml@master

    with:
      IMAGE_NAME: YOUR_DOCKER_USERNAME/my-nginx-app
      IMAGE_TAG: latest
      DOCKERFILE_PATH: ./docker/Dockerfile
      CONTEXT: .

    secrets: inherit